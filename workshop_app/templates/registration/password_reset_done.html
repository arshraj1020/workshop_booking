{% extends "workshop_app/base.html" %}
{% block title %} Forgot Password {% endblock %}

{% block content %}

<style>
body {
    background: linear-gradient(135deg, #2563eb, #1e293b);
    min-height: 100vh;
}

/* CENTER WRAPPER */
.wrapper {
    min-height: 85vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

/* CARD */
.card-box {
    background: #ffffff;
    padding: 35px 25px;
    border-radius: 20px;
    text-align: center;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.25);
}

/* 🔥 FIX TEXT VISIBILITY */
.card-box * {
    color: #1e293b !important;
}

.title {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 15px;
}

/* SUCCESS MESSAGE */
.msg {
    background: #dcfce7;
    padding: 12px;
    border-radius: 10px;
    color: #166534 !important;
    margin-bottom: 25px;
    font-size: 14px;
}

/* BUTTON */
.btn-custom {
    padding: 12px 25px;
    background: linear-gradient(135deg, #3b82f6, #2563eb);
    color: white !important;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
    display: inline-block;
}

.btn-custom:hover {
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
}

/* 📱 MOBILE */
@media (max-width: 480px) {
    .card-box {
        padding: 25px 20px;
    }

    .title {
        font-size: 20px;
    }
}
</style>

<div class="wrapper">
    <div class="card-box">

        <div class="title">Password Reset Sent 📧</div>

        <div class="msg">
            Instructions to reset your password have been mailed to your registered email address.
        </div>

        <a class="btn-custom" href="{% url 'workshop_app:login' %}">
            Go to Login
        </a>

    </div>
</div>

{% endblock %}
