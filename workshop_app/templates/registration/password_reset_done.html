{% extends "workshop_app/base.html" %}
{% block title %} Forgot Password {% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #2563eb, #1e293b);
        min-height: 100vh;
    }

    .wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .card-box {
        background: rgba(255,255,255,0.98);
        padding: 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .title {
        font-size: 26px;
        font-weight: 700;
        margin-bottom: 15px;
    }

    .msg {
        background: #dcfce7;
        padding: 12px;
        border-radius: 10px;
        color: #166534;
        margin-bottom: 25px;
    }

    .btn-custom {
        padding: 12px 25px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-weight: 600;
    }
</style>

<div class="wrapper">
    <div class="card-box">

        <div class="title">Password Reset Sent 📧</div>

        <div class="msg">
            Instructions to reset your password have been mailed to your registered email address.
        </div>

        <a class="btn-custom" href="{% url 'workshop_app:login' %}">
            Go to Login
        </a>

    </div>
</div>

{% endblock %}
