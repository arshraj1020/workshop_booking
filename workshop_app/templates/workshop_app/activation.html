{% extends 'workshop_app/base.html' %}

{% block title %}
Activation Pending
{% endblock %}

{% block content %}

<style>
    body {
        background: linear-gradient(135deg, #2563eb, #1e293b);
        min-height: 100vh;
    }

    .activation-wrapper {
        min-height: 90vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 10px;
    }

    .activation-card {
        background: rgba(255, 255, 255, 0.98);
        padding: 50px 40px;
        border-radius: 20px;
        text-align: center;
        max-width: 550px;
        width: 100%;
        box-shadow: 0 25px 60px rgba(0,0,0,0.3);
        animation: fadeUp 0.5s ease;
    }

    @keyframes fadeUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .activation-icon {
        font-size: 50px;
        margin-bottom: 20px;
    }

    .activation-title {
        font-size: 26px;
        font-weight: 700;
        color: #1e293b;
        margin-bottom: 15px;
    }

    .activation-text {
        color: #64748b;
        font-size: 15px;
        margin-bottom: 25px;
        line-height: 1.6;
    }

    .highlight {
        color: #2563eb;
        font-weight: 600;
    }

    .btn-secondary {
        display: inline-block;
        padding: 12px 25px;
        background: #e2e8f0;
        color: #1e293b;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
        margin-right: 10px;
    }

    .btn-primary {
        display: inline-block;
        padding: 12px 25px;
        background: linear-gradient(135deg, #3b82f6, #2563eb);
        color: white;
        border-radius: 10px;
        font-weight: 600;
        text-decoration: none;
        transition: 0.3s;
        box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
    }

    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.4);
    }

    .btn-secondary:hover {
        background: #cbd5f5;
    }
</style>

<div class="activation-wrapper">
    <div class="activation-card">

        <div class="activation-icon">📧</div>

        <div class="activation-title">
            Check Your Email
        </div>

        <div class="activation-text">
            We’ve sent an <span class="highlight">activation link</span> to your email.<br><br>
            Please click the link to activate your account.<br><br>
            ⏳ The link will expire in <span class="highlight">24 hours</span>.
        </div>

        <div>
            <a href="{% url 'workshop_app:login' %}" class="btn-secondary">
                Go to Login
            </a>

            <!-- Optional: future feature -->
            <a href="#" class="btn-primary">
                Resend Link
            </a>
        </div>

    </div>
</div>

{% endblock %}
